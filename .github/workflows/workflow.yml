name: fleetflow Partie 4

on:
  push:
    branches: [ "marouane" ]
  pull_request:
    branches: [ "marouane" ]

jobs:
  built-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: maven
      - name: Test with mvn
        run: mvn test

      - name: Build mvn
        run: mvn package -DskipTests
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn clean install