name: FleetFlow

on:
  push:
    branches: "main"
  pull_request:
    branches: "main"
jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'


      - name: Run Tests
        run: mvn test

      - name: Build with Maven
        run: mvn package -DskipTests